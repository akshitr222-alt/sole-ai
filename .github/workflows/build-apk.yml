name: Build SOLE AI APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle Build Tool
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4

      - name: Inject Gemini API Key
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          mkdir -p app/src/main/assets
          echo "gemini.api.key=$GEMINI_API_KEY" > app/src/main/assets/local.properties

      - name: Compile and Build Debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload Compiled APK
        uses: actions/upload-artifact@v4
        with:
          name: SOLE-AI-App
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
